services:
  # 1. Banco de Dados PostgreSQL Gratuito
  - type: psql
    name: maiscorporativo-db
    plan: free

  # 2. Backend (NestJS API)
  - type: web
    name: maiscorporativo-api
    env: node
    plan: free
    region: ohio
    buildCommand: npm install && npx turbo run build --filter=@votorantim-futebol/api
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maiscorporativo-db
          property: connectionString
      - key: JWT_SECRET
        value: mais_corporativo_secret_key_2026
      - key: PORT
        value: 3001

  # 3. Frontend (Next.js App)
  - type: web
    name: maiscorporativo-web
    env: node
    plan: free
    region: ohio
    buildCommand: npm install && npx turbo run build --filter=@votorantim-futebol/web
    startCommand: npm start --workspace=@votorantim-futebol/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: maiscorporativo-api
          property: url
      - key: NODE_ENV
        value: production
